
<style>
body{margin:0;padding:0;font-family:"Anthropic Sans",sans-serif;background:transparent}
#hint{font-size:12px;color:#888;padding:6px 2px 10px}
#erd svg{width:100%;cursor:default}
#legend{display:none;margin-top:12px;padding:12px 16px;background:rgba(0,0,0,0.03);border-radius:10px;font-size:12px;color:#555;border:0.5px solid #ddd}
</style>
<div id="hint">Survoler une table pour voir ses relations • Cliquer pour verrouiller</div>
<div id="erd"></div>
<div id="legend"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
const C={
  selected:{fill:dark?'#0C447C':'#dbeeff',stroke:'#185FA5',text:dark?'#B5D4F4':'#0C447C',sw:'2.5'},
  related:{fill:dark?'#085041':'#dcf5ec',stroke:'#1D9E75',text:dark?'#9FE1CB':'#085041',sw:'2'},
  dimmed:{fill:dark?'#111':'#f7f7f5',stroke:dark?'#252523':'#e2e2de',text:dark?'#2e2e2c':'#c8c8c4',sw:'0.5'},
  default:{fill:dark?'#1e1e1e':'#f8f8f6',stroke:dark?'#444':'#ccc',text:dark?'#c2c0b6':'#3d3d3a',sw:'1'},
};
const EON=dark?'#1D9E75':'#0F6E56',EOFF=dark?'#1c1c1a':'#ebebE6';

const RELS=[
['roles','users','1 → N','définit'],
['lieux','beneficiaires','1 → N','localise'],
['lieux','prestataires','1 → N','localise'],
['lieux','classes','1 → N','accueille'],
['formations','formateurs','1 → N','forme'],
['formations','prestations','1 → N','porte'],
['prestataires','prestations','1 → N','exécute'],
['beneficiaires','prestations','1 → N','commande'],
['prestations','classes','1 → N','organise'],
['classes','apprenants','1 → N','contient'],
['apprenants','phases','1 → N','traverse'],
['apprenants','appel_apprenant','1 → N','reçoit'],
['users','appel_apprenant','1 → N','passe'],
['formateurs','appel_formateur','1 → N','reçoit'],
['users','appel_formateur','1 → N','passe'],
['appel_apprenant','audio','1 → N','génère'],
['appel_formateur','audio','1 → N','génère'],
['appel_apprenant','satisfaction_apprenants','1 → 1','produit'],
['appel_formateur','satisfaction_formateurs','1 → 1','produit'],
['apprenants','presences_controle','1 → N','contrôle'],
['classes','presences_controle','1 → N','concerne'],
['users','presences_controle','1 → N','effectue'],
['inspecteurs','presences_controle','1 → N','supervise'],
['inspecteurs','environnement_enquete','1 → N','supervise'],
['classes','environnement_enquete','1 → N','évaluée'],
['users','environnement_enquete','1 → N','réalise'],
['classes','analyse_classe','1 → N','analysée'],
['prestations','analyse_prestation','1 → N','analysée'],
['users','messaging_campagne_message','1 → N','lance'],
['apprenants','messaging_campagne_message','1 → N','ciblé'],
['users','messaging_support_alarm','1 → N','signale'],

function nbrs(n){const s=new Set();for(const[a,b]of RELS){if(a===n)s.add(b);if(b===n)s.add(a);}return s;}
function relsFor(n){return RELS.filter(([a,b])=>a===n||b===n);}

await document.fonts.ready;
mermaid.initialize({startOnLoad:false,theme:'base',fontFamily:'"Anthropic Sans",sans-serif',
themeVariables:{darkMode:dark,fontSize:'12px',fontFamily:'"Anthropic Sans",sans-serif',
lineColor:dark?'#9c9a92':'#73726c',textColor:dark?'#c2c0b6':'#3d3d3a',
primaryColor:dark?'#1e1e1e':'#f8f8f6',primaryBorderColor:dark?'#444':'#ccc'}});

  roles ||--o{ users : "definit"

const{svg}=await mermaid.render('erd-svg',diagram);
document.getElementById('erd').innerHTML=svg;

document.querySelectorAll('#erd svg .node').forEach(nd=>{
  const fp=nd.querySelector('path[d]');if(!fp)return;
  const nums=fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
  if(!nums||nums.length<8)return;
  const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style'])if(fp.hasAttribute(a))r.setAttribute(a,fp.getAttribute(a));
  fp.replaceWith(r);
});
document.querySelectorAll('#erd svg .row-rect-odd path,.row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
document.querySelectorAll('#erd svg .node, #erd svg .node *').forEach(el=>{el.style.pointerEvents='all';});

const nodeMap={};
document.querySelectorAll('#erd svg .node').forEach(nd=>{
  const l=nd.querySelector('text');if(!l)return;
  const name=l.textContent.trim().toLowerCase().replace(/\s+/g,'_');
  nodeMap[name]=nd;nd.dataset.tn=name;
});

const edgeMap=[];
const allEP=[...document.querySelectorAll('#erd svg .edgePaths path,#erd svg .edgePath path')];
allEP.forEach((p,i)=>{if(i<RELS.length)edgeMap.push({el:p,a:RELS[i][0],b:RELS[i][1]});});

function sN(nd,c){
  const r=nd.querySelector('rect');
  if(r){r.setAttribute('fill',c.fill);r.setAttribute('stroke',c.stroke);r.setAttribute('stroke-width',c.sw);}
  nd.querySelectorAll('text').forEach(t=>t.setAttribute('fill',c.text));
}
function sE(name,nb){
  edgeMap.forEach(({el,a,b})=>{
    const on=(a===name&&nb.has(b))||(b===name&&nb.has(a));
    el.setAttribute('stroke',on?EON:EOFF);
    el.setAttribute('stroke-width',on?'2.5':'0.6');
    el.setAttribute('opacity',on?'1':'0.07');
  });
}
function resetAll(){
  Object.values(nodeMap).forEach(nd=>sN(nd,C.default));
  edgeMap.forEach(({el})=>{el.removeAttribute('stroke');el.removeAttribute('stroke-width');el.removeAttribute('opacity');});
  document.getElementById('legend').style.display='none';
}

function doHL(name){
  const nb=nbrs(name);
  Object.entries(nodeMap).forEach(([n,nd])=>{sN(nd,n===name?C.selected:nb.has(n)?C.related:C.dimmed);});
  sE(name,nb);
  const box=document.getElementById('legend');
  const selBg=dark?'#0C447C':'#dbeeff',selClr=dark?'#B5D4F4':'#0C447C';
  const relBg=dark?'#0a3d27':'#dcf5ec',relClr=dark?'#9FE1CB':'#085041';
  const cardBg=dark?'#1a3a2a':'#c8eddc';
  const myR=relsFor(name);
  const rows=myR.map(([a,b,card,label])=>{
    const other=a===name?b:a;
    const arrow=a===name?'→':'←';
    return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:0.5px solid ${dark?'#1e1e1c':'#eee'}">
      <span style="color:${dark?'#555':'#ccc'};font-size:13px">${arrow}</span>
      <span style="background:${relBg};color:${relClr};border-radius:20px;padding:1px 9px;font-family:monospace;font-size:11px">${other}</span>
      <span style="background:${cardBg};color:${relClr};border-radius:6px;padding:1px 7px;font-size:10px;font-family:monospace">${card}</span>
      <span style="color:${dark?'#555':'#bbb'};font-size:11px;font-style:italic">${label}</span>
    </div>`;
  }).join('');
  box.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
    <span style="background:${selBg};color:${selClr};border-radius:20px;padding:2px 12px;font-family:monospace;font-size:13px;font-weight:600">${name}</span>
    <span style="color:${dark?'#555':'#ccc'};font-size:11px">${myR.length} relation${myR.length>1?'s':''}</span>
    ${locked===name?`<span style="background:${dark?'#3a2800':'#fff8e6'};color:${dark?'#ffcc66':'#a06000'};border-radius:20px;padding:1px 8px;font-size:10px">🔒 verrouillé</span>`:''}
  </div><div>${rows}</div>`;
  box.style.display='block';
  if(dark){box.style.background='rgba(255,255,255,0.03)';box.style.borderColor='#2a2a28';box.style.color='#888';}
}

function findTN(t){let el=t;while(el&&el!==document){if(el.classList&&el.classList.contains('node')&&el.dataset.tn)return el.dataset.tn;el=el.parentElement;}return null;}

let locked=null,hovered=null;
const svgEl=document.querySelector('#erd svg');
if(svgEl){
  svgEl.addEventListener('mousemove',e=>{
    if(locked)return;
    const name=findTN(e.target);
    if(name===hovered)return;
    hovered=name;
    name?doHL(name):resetAll();
  });
  svgEl.addEventListener('mouseleave',()=>{if(locked)return;hovered=null;resetAll();});
  svgEl.addEventListener('click',e=>{
    e.stopPropagation();
    const name=findTN(e.target);
    if(!name){if(locked){locked=null;hovered=null;resetAll();}return;}
    if(locked===name){locked=null;hovered=null;resetAll();}
    else{locked=name;doHL(name);}
  });
}
</script>
